name: Build IG and publish to GitHub Pages

on:
  push:
    branches-ignore: [gh-pages]
  pull_request:
  workflow_dispatch:

# Community FHIR-IG pattern: deploy by pushing the built site to the gh-pages
# branch (no pages:/id-token: OIDC needed).
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Seeds the unpublished et.fhir.core dep into the container's package cache
      # (where SUSHI looks), then runs the IG Publisher. See _ci-build.sh.
      - name: Build IG
        uses: docker://hl7fhir/ig-publisher-base:latest
        with:
          args: bash _ci-build.sh

      - name: Upload build output as an artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ig-output
          path: |
            output/qa.html
            output/package.tgz
          if-no-files-found: warn

      # Publishes the site (and a referenceable package.tgz) to
      # https://<owner>.github.io/<repo>/ . Enable Pages -> branch gh-pages once.
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ./output
          single-commit: true
