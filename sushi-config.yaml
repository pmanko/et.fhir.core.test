id: et.fhir.core.test
canonical: http://fhir.et/core/test
name: ETCoreTest
title: "Ethiopia Core IG Conformance Test Fixtures"
description: "Curated test instances (valid + intentionally invalid) for validating against the Ethiopia Base IG (et.fhir.core). These fixtures are the data consumed by the hapi-sandbox conformance harness — the harness itself carries no data."
status: draft
experimental: true
version: 0.1.0
fhirVersion: 4.0.1
copyrightYear: 2026+
releaseLabel: ci-build
license: CC-BY-SA-4.0
jurisdiction: "urn:iso:std:iso:3166#ET"
publisher:
  name: MOH Ethiopia
  url: http://moh.gov.et

# Pairs with the Ethiopia base IG (et.fhir.core). Pinned to the published dev
# build (v0.9.0) on GitHub Pages. CI pre-seeds this exact version into the
# package cache from that dev build (see .github/workflows/build.yml); for local
# builds, seed it once with:
#   curl -fsSL https://moh-ethiopia.github.io/ETBase/package.tgz | \
#     tar -xz -C "$(mkdir -p ~/.fhir/packages/et.fhir.core#0.9.0 && echo $_)"
dependencies:
  et.fhir.core: 0.9.0

pages:
  index.md:
    title: Overview

# fhir.base.template includes menu.xml; SUSHI generates it from this block.
menu:
  Home: index.html
  Artifacts: artifacts.html
